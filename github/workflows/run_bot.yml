name: OLX Telegram Bot Monitor

on:
  schedule:
    # Roda a cada 10 minutos. Ajuste conforme necessário.
    # Para testar, você pode mudar para 'workflow_dispatch:' e rodar manualmente.
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run OLX Monitor Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        SEARCH_URL: "https://www.olx.com.br/brasil?q=${{ secrets.KEYWORD }}&sf=1"
      run: python monitor.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add last_ad.txt
        git commit -m "Update last_ad.txt" || echo "No changes to commit"
        git push

